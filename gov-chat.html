<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure RAG Chatbot - Gov Handbook</title>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      #chat-container {
        width: 500px;
        height: 750px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #chat-header {
        background: #005a9e;
        color: white;
        padding: 20px;
        text-align: center;
        font-weight: 600;
        font-size: 1.2rem;
      }
      #chat-messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #fafafa;
      }
      .message {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 15px;
        font-size: 0.95rem;
        line-height: 1.5;
        word-break: break-all;
      }
      .user {
        align-self: flex-end;
        background-color: #0078d4;
        color: white;
        border-bottom-right-radius: 2px;
      }
      .bot {
        align-self: flex-start;
        background-color: #ffffff;
        border: 1px solid #e1e4e8;
        color: #24292e;
        border-bottom-left-radius: 2px;
      }

      /* 질의 샘플 스타일 */
      #samples-area {
        padding: 10px 15px;
        background: #fff;
        border-top: 1px solid #eee;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .sample-btn {
        background: #f1f3f4;
        border: 1px solid #dadce0;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        cursor: pointer;
        transition: 0.2s;
      }
      .sample-btn:hover {
        background: #e8eaed;
        border-color: #bdc1c6;
      }

      #chat-input-area {
        border-top: 1px solid #eee;
        padding: 15px;
        display: flex;
        gap: 10px;
        background: white;
      }
      #user-input {
        flex: 1;
        border: 1px solid #ddd;
        padding: 12px;
        border-radius: 8px;
        outline: none;
        font-size: 1rem;
      }
      #send-btn {
        background: #0078d4;
        color: white;
        border: none;
        padding: 0 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }
      #send-btn:disabled {
        background: #a1c9e9;
        cursor: not-allowed;
      }
      .loading {
        font-size: 0.85rem;
        color: #666;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div id="chat-container">
      <div id="chat-header">정부 지침서 RAG 지능형 검색</div>
      <div id="chat-messages"></div>

      <div id="samples-area">
        <button class="sample-btn" onclick="useSample(this)">
          행정업무 효율 운영 의의
        </button>
        <button class="sample-btn" onclick="useSample(this)">
          공문서 날짜/시간 표기법
        </button>
        <button class="sample-btn" onclick="useSample(this)">
          기안문 결재선 표기 원칙
        </button>
        <button class="sample-btn" onclick="useSample(this)">
          전자문서 권한 관리자 확인
        </button>
        <button class="sample-btn" onclick="useSample(this)">
          영상회의실 필수 항목
        </button>
        <button class="sample-btn" onclick="useSample(this)">
          개방형 문서 정의/이유
        </button>
        <button class="sample-btn" onclick="useSample(this)">
          공문서 가독성 권장 설정
        </button>
        <button class="sample-btn" onclick="useSample(this)">
          민원 문서 기한 연장
        </button>
      </div>

      <div id="chat-input-area">
        <input
          type="text"
          id="user-input"
          placeholder="질문을 입력하거나 위 샘플을 클릭하세요..."
          onkeypress="if (event.keyCode == 13) sendMessage();"
        />
        <button id="send-btn" onclick="sendMessage()">전송</button>
      </div>
    </div>

    <script>
      const API_URL = "/api/chatv1";

      const test="test";

      // 질의 샘플 맵핑
      const sampleQueries = {
        "행정업무 효율 운영 의의":
          "행정업무의 효율적 운영이 가지는 핵심적인 의의와 목적은 무엇임?",
        "공문서 날짜/시간 표기법":
          "공문서 작성 시 날짜와 시간(시·분)을 표기하는 올바른 방법은?",
        "기안문 결재선 표기 원칙":
          "기안문의 결재선 설정 시 직위와 성명 표기 원칙은?",
        "전자문서 권한 관리자 확인":
          "전자문서시스템의 사용 권한 부여 시 관리자 확인 사항은?",
        "영상회의실 필수 항목":
          "정부영상회의실 사용신청서에 기재해야 할 필수 항목은?",
        "개방형 문서 정의/이유": "개방형 문서 형식의 정의와 사용 이유는?",
        "공문서 가독성 권장 설정":
          "공문서 본문의 시각적 가독성을 높이기 위한 권장 설정은?",
        "민원 문서 기한 연장":
          "민원 문서 접수 처리 시 기한 연장 사유와 방법은?",
      };

      function useSample(btn) {
        const query = sampleQueries[btn.innerText];
        document.getElementById("user-input").value = query;
        sendMessage();
      }

      async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatMessages = document.getElementById("chat-messages");
        const sendBtn = document.getElementById("send-btn");
        const userText = inputField.value.trim();

        if (!userText) return;

        appendMessage("user", userText);
        inputField.value = "";
        sendBtn.disabled = true;

        const loadingDiv = document.createElement("div");
        loadingDiv.className = "message bot loading";
        loadingDiv.innerText = "Azure AI가 지침서를 분석 중입니다...";
        chatMessages.appendChild(loadingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
          // URL 파라미터로 code(Function Key)와 query를 함께 전달함
          const response = await fetch(
            `${API_URL}?query=${encodeURIComponent(userText)}`,
            {
              method: "GET",
            },
          );

          if (!response.ok) throw new Error("인증 실패 또는 네트워크 오류");

          const botText = await response.text();

          loadingDiv.remove();
          appendMessage("bot", botText);
        } catch (error) {
          loadingDiv.remove();
          appendMessage(
            "bot",
            "죄송합니다. 서비스 통신 중 오류가 발생했습니다.",
          );
        } finally {
          sendBtn.disabled = false;
        }
      }

      function appendMessage(sender, text) {
        const chatMessages = document.getElementById("chat-messages");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
    </script>
  </body>
</html>
