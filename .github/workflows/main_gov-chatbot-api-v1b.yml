name: Deploy Python Function App

on:
  push:
    branches:
      - main  # 1. 실제 사용하는 브랜치 이름으로 확인

env:
  AZURE_FUNCTIONAPP_NAME: '사용중인-함수앱-이름' # 2. Azure Portal에 표시된 실제 이름으로 수정
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # 3. 별도의 빌드 단계 없이 바로 배포 단계에서 원격 빌드(Oryx) 수행
      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }} # 4. GitHub Secret 이름 확인
          scm-do-build-during-deployment: true
          enable-oryx-build: true
